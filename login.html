<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AdminExpress - Login</title>
    <meta name="description" content="Pagina de Login, AdminExpress">
    <link href="css/login.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1>AdminExpress</h1>
    </header>
    <main>
        <section class="pagina">
            <article class="Izquierda">
                <h2>AdminExpress</h2>
            </article>
            <article class="Derecha">
                <h2>Let's <span>Sign In</span></h2>
                <h3>Hey, enter your details to get sign in to your account.</h3>
                <div class="campo">
                    <label for="email"><h4>Email</h4></label>
                    <div class="input">
                        <span>✉</span>
                        <input type="email" id="email" placeholder="Enter email">
                    </div>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
